name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case clearly.
      placeholder: I'm trying to do X but currently I have to workaround by doing Y...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Sourcing Engine / Strategies
        - Fulfillment Pipeline
        - Inventory Management
        - Connectors
        - AI / Learning Loop
        - Webhooks
        - API / Schema
        - Frontend UI
        - Developer Experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested before
          required: true
        - label: I would be willing to submit a PR for this feature
