name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the issue.
      placeholder: |
        1. Start with `docker compose up`
        2. Create an order via POST /orders
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Sourcing Engine
        - Fulfillment Pipeline
        - Inventory
        - Connectors (Shopify / Amazon)
        - AI / Architect
        - Webhooks
        - Authentication / RBAC
        - Frontend UI
        - Docker / Infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit SHA
      placeholder: "e.g. v0.1.0 or abc1234"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any stack traces or log lines here.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am running with `docker compose up` (not a custom setup)
